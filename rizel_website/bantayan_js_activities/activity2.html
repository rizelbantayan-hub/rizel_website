<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <h1>Activity 2: Variables</h1>

    <script>
        let name = "Althea";
        const age = 19;
        let isStudent = true;

        console.log("Name:", name);
        console.log("Age:", age);
        console.log("Is Student:", isStudent);

        console.log("Type of name:", typeof name);
        console.log("Type of age:", typeof age);
        console.log("Type of isStudent:", typeof isStudent);
    </script>
</body>
</html>
