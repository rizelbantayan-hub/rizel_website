<body>
    <h1>Activity 3: Operators</h1>
<script>
    let x = 10;
    let y = 5;

    console.log("x + y =", x + y);
    console.log("x - y =", x + y);
    console.log("x * y =", x * y);
    console.log("x / y =", x / y);
    console.log("x % y =", x % y);

    console.log("x > y ?", x > y);
    console.log("x ==== 10 ?", x === 10);
    console.log("x == '10' ?", x == "10");
    console.log("x === '10' ?", x === "10");
</script>
</body>
</html>
